[build]

[build.environment]
  NODE_VERSION = "18"

# ── Function-level config ──────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/utils/**"]

# ── Redirects: clean URLs for each function ───────────────────────────────────
[[redirects]]
  from = "/api/hubspot/*"
  to = "/.netlify/functions/hubspot/:splat"
  status = 200

[[redirects]]
  from = "/api/outlook/*"
  to = "/.netlify/functions/outlook/:splat"
  status = 200

[[redirects]]
  from = "/api/enrich/*"
  to = "/.netlify/functions/enrich/:splat"
  status = 200

[[redirects]]
  from = "/api/ai/*"
  to = "/.netlify/functions/ai/:splat"
  status = 200

# ── SPA fallback (for React router) ──────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── CORS preflight ────────────────────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED ENVIRONMENT VARIABLES
# Set all of these in Netlify → Site settings → Environment variables
# ─────────────────────────────────────────────────────────────────────────────
#
# Clerk
#   CLERK_SECRET_KEY              From Clerk dashboard → API Keys
#   VITE_CLERK_PUBLISHABLE_KEY    From Clerk dashboard → API Keys (frontend)
#
# HubSpot
#   HUBSPOT_CLIENT_ID             From HubSpot → Settings → App → OAuth
#   HUBSPOT_CLIENT_SECRET         From HubSpot → Settings → App → OAuth
#   HUBSPOT_REDIRECT_URI          https://yourapp.netlify.app/api/hubspot/auth/callback
#
# Azure Storage (same account as Market Mapper)
#   AZURE_STORAGE_ACCOUNT_NAME    carepathiqdata
#   AZURE_STORAGE_SAS_TOKEN       Your SAS token (?sv=...)
#                                 Make sure the SAS token has write access to
#                                 the "crm-tokens" container (create it in Azure portal)
#
# App
#   APP_URL                       https://yourapp.netlify.app
#   ZOOMINFO_API_KEY              From ZoomInfo developer portal (add later)
